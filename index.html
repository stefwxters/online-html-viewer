<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Online Viewer - Pro Edition</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌐%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg-primary: #f5f5f5;
            --bg-sidebar: #2c3e50;
            --bg-header: #34495e;
            --text-main: #333;
            --text-sidebar: #ecf0f1;
            --border-color: #ccc;
            --accent: #3498db;
            --editor-bg: #fafafa;
        }

        body.dark {
            --bg-primary: #1e1e1e;
            --bg-sidebar: #121212;
            --bg-header: #1a1a1a;
            --text-main: #eee;
            --text-sidebar: #bdc3c7;
            --border-color: #444;
            --editor-bg: #2d2d2d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: var(--bg-header);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .sidebar-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .sidebar-item:hover {
            background: var(--bg-header);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Sections */
        .code-section {
            width: 50%;
            display: flex;
            flex-direction: column;
            min-width: 100px;
        }

        #dragbar {
            width: 6px;
            cursor: col-resize;
            background: var(--border-color);
            transition: background 0.2s;
        }

        #dragbar:hover {
            background: var(--accent);
        }

        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 100px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--bg-header);
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: white;
            opacity: 0.6;
        }

        .tabs button.active {
            opacity: 1;
            background: var(--editor-bg);
            color: var(--text-main);
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            resize: none;
            background: var(--editor-bg);
            color: var(--text-main);
        }

        iframe {
            flex: 1;
            border: none;
            background: white;
        }

        @media(max-width: 768px) {
            .editor-container {
                flex-direction: column;
            }

            .code-section,
            .preview-section {
                width: 100% !important;
                height: 50%;
            }

            #dragbar {
                display: none;
            }

            .sidebar {
                width: 60px;
            }

            .sidebar span {
                display: none;
            }

            .sidebar-header {
                font-size: 10px;
                text-align: center;
                padding: 10px;
            }

        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">HTML Viewer</div>
        <div class="sidebar-item" onclick="toggleDarkMode()">🌙 <span>Dark Mode</span></div>
        <div class="sidebar-item" onclick="copyCode()">📋 <span>Copy Code</span></div>
        <div class="sidebar-item" onclick="insertSnippet('button')">🔘 <span>Button</span></div>
        <div class="sidebar-item" onclick="insertSnippet('form')">📄 <span>Form</span></div>
        <div class="sidebar-item" onclick="validateCode()">✅ <span>Validate</span></div>
        <div class="sidebar-item" onclick="exportFile()">📤 <span>Export HTML</span></div>
        <div class="sidebar-item" onclick="exportZip()">🗜 <span>Export ZIP</span></div>
    </div>

    <div class="main-content">
        <div class="editor-container">
            <div class="code-section" id="editorPane">
                <div class="tabs">
                    <button id="tab-html" class="active" onclick="switchTab('html')">HTML</button>
                    <button id="tab-css" onclick="switchTab('css')">CSS</button>
                    <button id="tab-js" onclick="switchTab('js')">JS</button>
                </div>
                <textarea id="htmlCode" placeholder="HTML..."></textarea>
                <textarea id="cssCode" style="display:none;" placeholder="CSS..."></textarea>
                <textarea id="jsCode" style="display:none;" placeholder="JS..."></textarea>
            </div>

            <div id="dragbar"></div>

            <div class="preview-section">
                <iframe id="preview" sandbox="allow-scripts"></iframe>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const state = {
            activeTab: 'html',
            defaults: {
                html: '<!DOCTYPE html>\n<html>\n<body>\n  <h1>Hello World</h1>\n</body>\n</html>',
                css: 'body { font-family: sans-serif; text-align: center; padding-top: 50px; }',
                js: 'console.log("Preview Loaded");'
            }
        };

        // --- Core Logic ---

        function updatePreview() {
            const html = document.getElementById('htmlCode').value;
            const css = `<style>${document.getElementById('cssCode').value}</style>`;
            const js = `<script>${document.getElementById('jsCode').value}<\/script>`;
            const combined = `${html}${css}${js}`;

            const iframe = document.getElementById('preview');
            // Using srcdoc is faster than blobs for small snippets
            iframe.srcdoc = combined;
        }

        // Debounce prevents lag while typing
        function debounce(func, wait = 300) {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
        const debouncedUpdate = debounce(updatePreview);

        // --- Initialization ---

        ['html', 'css', 'js'].forEach(type => {
            const el = document.getElementById(type + 'Code');
            const saved = localStorage.getItem(type + 'Code');
            el.value = saved || state.defaults[type];

            el.addEventListener('input', () => {
                localStorage.setItem(type + 'Code', el.value);
                debouncedUpdate();
            });
        });

        window.addEventListener('DOMContentLoaded', updatePreview);

        // --- Tabs ---

        function switchTab(tab) {
            state.activeTab = tab;
            ['html', 'css', 'js'].forEach(t => {
                document.getElementById(t + 'Code').style.display = (t === tab) ? 'block' : 'none';
                document.getElementById('tab-' + t).classList.toggle('active', t === tab);
            });
        }

        // --- Slider Bug Fix ---

        const dragbar = document.getElementById('dragbar');
        const editorPane = document.getElementById('editorPane');
        const sidebar = document.querySelector('.sidebar');

        dragbar.addEventListener('mousedown', (e) => {
            document.body.style.cursor = 'col-resize';
            // Disable iframe interactions so they don't eat mouse events
            document.getElementById('preview').style.pointerEvents = 'none';

            const onMouseMove = (e) => {
                // Calculation: Mouse pos - Sidebar width = actual desired editor width
                const sidebarWidth = sidebar.offsetWidth;
                let newWidth = e.clientX - sidebarWidth;

                // Constraints
                if (newWidth > 100 && newWidth < (window.innerWidth - 300)) {
                    editorPane.style.width = newWidth + 'px';
                }
            };

            const onMouseUp = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                document.body.style.cursor = 'default';
                document.getElementById('preview').style.pointerEvents = 'auto';
            };

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });

        // --- Features ---

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

        function insertSnippet(type) {
            const editor = document.getElementById('htmlCode');
            const snippets = {
                button: `<button>Click Me</button>`,
                form: `<form>\n  <input type="text" placeholder="Name">\n  <button>Send</button>\n</form>`
            };

            // Insert at cursor position instead of appending at end
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            editor.value = text.substring(0, start) + snippets[type] + text.substring(end);

            switchTab('html');
            updatePreview();
        }

        async function validateCode() {
            const code = document.getElementById('htmlCode').value;
            try {
                const res = await fetch('https://validator.w3.org/nu/?out=json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/html; charset=utf-8' },
                    body: code
                });
                const data = await res.json();
                alert(data.messages.length ? data.messages.map(m => m.message).join('\n') : "Perfect! No errors.");
            } catch (e) {
                alert("Validation failed. This often happens due to CORS security blocks in browsers.");
            }
        }

        function copyCode() {
            const activeEl = document.getElementById(state.activeTab + 'Code');
            navigator.clipboard.writeText(activeEl.value).then(() => alert('Copied current tab!'));
        }

        function exportFile() {
            const blob = new Blob([document.getElementById('htmlCode').value], { type: 'text/html' });
            const a = Object.assign(document.createElement('a'), {
                href: URL.createObjectURL(blob),
                download: 'index.html'
            });
            a.click();
        }

        function exportZip() {
            if (typeof JSZip === 'undefined') return alert("ZIP library still loading...");
            const zip = new JSZip();
            zip.file("index.html", document.getElementById('htmlCode').value);
            zip.file("style.css", document.getElementById('cssCode').value);
            zip.file("script.js", document.getElementById('jsCode').value);
            zip.generateAsync({ type: "blob" }).then(content => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = "project.zip";
                a.click();
            });
        }
    </script>
</body>

</html>
